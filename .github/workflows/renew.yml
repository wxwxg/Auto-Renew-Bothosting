name: Auto Renew Bot-hosting

on:
  schedule:
    - cron: '0 0 */2 * *'        #2天1次，根据自己到期时间自己设置
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq wget net-tools
          pip install --upgrade pip
          pip install --upgrade seleniumbase requests
          seleniumbase install chromedriver

      - name: 🔗 配置代理（sing-box）
        if: env.NODE_LINK != ''
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          set -e
          echo "⬇️ 下载 sing-box 二进制..."
          LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | \
            grep -o '"browser_download_url": "[^"]*linux-amd64[^"]*"' | \
            grep -v 'alpha\|beta\|rc' | head -1 | sed 's/"browser_download_url": "//' | sed 's/"//')
          if [ -z "$LATEST_URL" ]; then echo "❌ 无法获取下载链接"; exit 1; fi
          echo "📥 下载地址: $LATEST_URL"
          for i in {1..3}; do
            echo "尝试 $i/3..."
            curl -L -o sing-box.tar.gz "$LATEST_URL" --connect-timeout 30 --max-time 60
            if [ -f sing-box.tar.gz ] && file sing-box.tar.gz | grep -q 'gzip compressed data'; then
              echo "✅ 下载成功"; break
            fi
            echo "⚠️ 重试..."; rm -f sing-box.tar.gz; sleep 3
          done
          [ -f sing-box.tar.gz ] || { echo "❌ 下载失败，跳过代理"; exit 0; }
          tar -xzf sing-box.tar.gz
          SING_BOX_DIR=$(find . -maxdepth 1 -type d -name "sing-box-*" | head -1)
          [ -z "$SING_BOX_DIR" ] && { echo "❌ 解压失败"; exit 1; }
          sudo mv "$SING_BOX_DIR/sing-box" /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          rm -rf sing-box.tar.gz "$SING_BOX_DIR"
          sing-box version

          echo "📝 解析 vless 链接并生成配置文件..."
          VLESS=$(echo "${NODE_LINK}" | tr -d ' \n\r\t')
          export VLESS
          if [[ ! "$VLESS" =~ ^vless:// ]]; then
            echo "⚠️ 链接不是 vless:// 协议，跳过代理"; exit 0
          fi

          python3 << 'PYEOF'
          import json, sys, os, re
          from urllib.parse import urlparse, parse_qs

          link = os.environ.get('VLESS', '')
          if not link:
              sys.exit(0)

          parsed = urlparse(link)
          if parsed.scheme != 'vless':
              sys.exit(0)

          netloc = parsed.netloc
          if '@' in netloc:
              uuid, host_port = netloc.split('@', 1)
          else:
              uuid, host_port = '', netloc

          host = ''
          port = '443'
          bracket_match = re.match(r'^\[([^\]]+)\](?::(\d+))?$', host_port)
          if bracket_match:
              host = bracket_match.group(1)
              if bracket_match.group(2):
                  port = bracket_match.group(2)
          else:
              if host_port.count(':') > 1:
                  host = host_port
              else:
                  if ':' in host_port:
                      host, port = host_port.split(':', 1)
                  else:
                      host = host_port

          if not host:
              print(f"❌ 无法解析主机地址: {host_port}")
              sys.exit(1)

          params = parse_qs(parsed.query)
          sni = params.get('sni', [''])[0] or host
          fp = params.get('fp', [''])[0] or 'chrome'
          flow = params.get('flow', [''])[0] or 'xtls-rprx-vision'
          type_ = params.get('type', ['tcp'])[0]
          security = params.get('security', [''])[0]

          outbound = {
              "type": "vless",
              "tag": "vless-out",
              "server": host,
              "server_port": int(port),
              "uuid": uuid,
              "flow": flow,
              "tls": {
                  "enabled": True,
                  "server_name": sni,
                  "insecure": False,
                  "utls": {"enabled": True, "fingerprint": fp}
              },
              "packet_encoding": "packetaddr"
          }
          if type_ != 'tcp':
              outbound["transport"] = {"type": type_}
          if security == 'reality':
              pbk = params.get('pbk', [''])[0]
              sid = params.get('sid', [''])[0]
              outbound['tls']['reality'] = {"enabled": True, "public_key": pbk, "short_id": sid}

          config = {
              "log": {"level": "warn"},
              "inbounds": [{"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 1080}],
              "outbounds": [outbound],
              "route": {"rules": [{"outbound": "vless-out", "protocol": ["tcp", "udp"]}]}
          }
          with open("sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("✅ 配置已生成")
          PYEOF

          if [ -f sing-box-config.json ]; then
              echo "🚀 启动 sing-box..."
              nohup sing-box -c sing-box-config.json run > sing-box.log 2>&1 &
              sleep 5
              if netstat -tuln | grep -q ':1080'; then
                  echo "✅ 代理已启动（127.0.0.1:1080）"
              else
                  echo "❌ 代理启动失败，查看日志："
                  cat sing-box.log
                  exit 1
              fi
          else
              echo "⚠️ 未生成配置文件，跳过代理"
          fi

      - name: 🚀 运行续期脚本
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          EMAIL: ${{ secrets.EMAIL }}
          SESSION_TOKEN: ${{ secrets.SESSION_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          IS_PROXY: true
          PROXY_SERVER: socks5://127.0.0.1:1080
          HEADLESS: false
        run: |
          xvfb-run --auto-servernum python3 renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f sing-box || true
          pkill -f chromedriver || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          rm -f sing-box sing-box.gz sing-box.tar.gz sing-box-config.json sing-box.log *.png

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              gh run delete $run_id || true
            fi
          done
